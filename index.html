<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Shadi Khodagholi — portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="author" content="Shadi Khodagholi">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Caveat:wght@500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="styles.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    body { font-family: "Instrument Serif", Georgia, serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="data.js"></script>
  <script type="text/babel" src="components-base.jsx"></script>
  <script type="text/babel" src="components-bg.jsx"></script>
  <script type="text/babel" src="components-hero.jsx"></script>
  <script type="text/babel" src="components-sections.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const TWEAK_DEFAULTS = {
      "accent": "#e07a5f",
      "heroVariant": "big"
    };

    const ACCENT_PRESETS = [
      { id: "gold",   label: "gold",   color: "#c9a96a" },
      { id: "ember",  label: "ember",  color: "#e07a5f" },
      { id: "moss",   label: "moss",   color: "#9bbf7a" },
      { id: "ice",    label: "ice",    color: "#7fb3d5" },
      { id: "violet", label: "violet", color: "#b39ddb" },
      { id: "rose",   label: "rose",   color: "#e0789b" },
    ];

    const HERO_VARIANTS = [
      { value: "live",  label: "live"  },
      { value: "typer", label: "typer" },
      { value: "big",   label: "big"   },
    ];

    const NAV = [
      { id: "home",        label: "home" },
      { id: "research",    label: "research" },
      { id: "education",   label: "education" },
      { id: "papers",      label: "papers" },
      { id: "experience",  label: "experience" },
      { id: "projects",    label: "projects" },
      { id: "off-screen",  label: "off-screen" },
    ];

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [active, setActive] = useState("home");
      const lockRef = useRef({ id: null, until: 0 });
      const accent = tweaks.accent;
      const data = window.PORTFOLIO;

      useEffect(() => {
        document.documentElement.style.setProperty("--accent", accent);
      }, [accent]);

      useEffect(() => {
        const observer = new IntersectionObserver((entries) => {
          if (Date.now() < lockRef.current.until) return;
          entries.forEach((e) => {
            if (e.isIntersecting) setActive(e.target.id);
          });
        }, { rootMargin: "-40% 0px -55% 0px", threshold: 0 });
        NAV.forEach(s => {
          const el = document.getElementById(s.id);
          if (el) observer.observe(el);
        });
        return () => observer.disconnect();
      }, []);

      const handleNavClick = (e, id) => {
        e.preventDefault();
        const el = document.getElementById(id);
        if (!el) return;
        lockRef.current = { id, until: Date.now() + 1200 };
        setActive(id);
        el.scrollIntoView({ behavior: "smooth", block: "start" });
        history.replaceState(null, "", "#" + id);
      };

      return (
        <>
          <BioBackground />
          <nav className="nav">
            <div className="nav-inner">
              <div className="nav-brand">
                <span className="glyph">z</span>
                <span>shadi.kh</span>
                <span className="dim" style={{marginLeft:6}}>· portfolio</span>
              </div>
              <div className="nav-links">
                {NAV.map((s, i) => (
                  <a key={s.id}
                     href={"#" + s.id}
                     onClick={(e) => handleNavClick(e, s.id)}
                     className={"nav-link " + (active === s.id ? "active" : "")}>
                    <span className="num">{String(i).padStart(2,"0")}</span>{s.label}
                  </a>
                ))}
              </div>
            </div>
          </nav>

          <main className="page">
            <section id="home" className="section" style={{paddingTop: 0, paddingBottom: 16, borderTop: "none"}}>
              <Hero variant={tweaks.heroVariant} data={data} accent={accent} />
            </section>

            <section id="research" className="section">
              <SectionHead num="01" title="Research focus" subtitle="threads I'm pulling on right now" accent={accent} />
              <div className="proj-grid" style={{gridTemplateColumns:"1fr 1fr"}}>
                {data.research_areas.map((r, i) => (
                  <div key={i} className="proj-card" style={{cursor:"default"}}>
                    <div className="proj-num mono" style={{color: accent}}>area · {String(i+1).padStart(2,"0")}</div>
                    <div className="proj-title">{r.tag}</div>
                    <p className="proj-detail" style={{marginTop:8}}>{r.note}</p>
                  </div>
                ))}
              </div>
            </section>

            <section id="education" className="section">
              <SectionHead num="02" title="Education" accent={accent} />
              <Education items={data.education} accent={accent} />
            </section>

            <section id="papers" className="section">
              <SectionHead num="03" title="Papers" subtitle={`${data.papers.length} entries · click a tab to switch view`} accent={accent} />
              <div className="paper-grid">
                {data.papers.map((p) => <PaperCard key={p.id} paper={p} accent={accent} />)}
              </div>
            </section>

            <section id="experience" className="section">
              <SectionHead num="04" title="Experience" subtitle="research, eng, teaching" accent={accent} />
              <Experience items={data.experience} accent={accent} />
            </section>

            <section id="projects" className="section">
              <SectionHead num="05" title="Side projects" subtitle="coursework + things I built to learn" accent={accent} />
              <Projects items={data.projects} accent={accent} />
            </section>

            <section id="off-screen" className="section">
              <SectionHead num="06" title="Off‑screen" subtitle="when the laptop is closed" accent={accent} />
              <Offscreen data={data} accent={accent} />
            </section>

            <footer className="foot">
              <div>
                <span className="dim">© 2026 · </span>
                {data.name} ·{" "}
                <a href={"mailto:" + data.links.email}>{data.links.email}</a>
              </div>
              <div className="dim">
                built in html · last commit{" "}
                <span style={{color: accent}}>{(new Date()).toISOString().slice(0,10)}</span>
              </div>
            </footer>
          </main>

          <TweaksPanel title="Tweaks" defaultPosition={{ right: 20, bottom: 20 }}>
            <TweakSection label="Accent">
              <TweakColor
                label="Color"
                value={tweaks.accent}
                onChange={(v) => setTweak("accent", v)}
              />
              <div style={{display:"flex", flexWrap:"wrap", gap:6, marginTop:6}}>
                {ACCENT_PRESETS.map(p => (
                  <button key={p.id}
                          onClick={() => setTweak("accent", p.color)}
                          title={p.label}
                          style={{
                            width: 26, height: 26, borderRadius: 4,
                            border: tweaks.accent.toLowerCase() === p.color.toLowerCase()
                              ? "2px solid #fff" : "1px solid #444",
                            background: p.color, cursor: "pointer", padding: 0,
                          }}/>
                ))}
              </div>
            </TweakSection>
            <TweakSection label="Hero variant">
              <TweakRadio
                label="Variant"
                value={tweaks.heroVariant}
                onChange={(v) => setTweak("heroVariant", v)}
                options={HERO_VARIANTS}
              />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
